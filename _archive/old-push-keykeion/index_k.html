<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astrological Birth Chart</title>
    <style>
        .datetime-container {
            display: flex;
            gap: 10px; /* Space between inputs */
        }
    </style>
</head>
<body>
    <h1>Generate Your Birth Chart</h1>
    <form action="/generate_chart" method="POST" target="chartFrame">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required><br><br>
        
        <label for="birthdate">Birthdate:</label>
        <input type="date" id="birthdate" name="birthdate" required>
        
        <div class="datetime-container">
            <label for="birthtime">Birth Time:</label>
            <input type="time" id="birthtime" name="birthtime" required>
            <input type="number" id="seconds" name="seconds" min="0" max="59" placeholder="SS" required style="width: 50px;">
        </div>
        
        <label for="birthcity">Birth City:</label>
        <input type="text" id="birthcity" name="birthcity" required><br><br>
        
        <button type="submit">Generate Chart</button>
    </form>

    <!-- Iframe to display the SVG chart -->
    <iframe name="chartFrame" width="600" height="600" style="border:none;"></iframe>
</body>
</html>
